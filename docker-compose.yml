services:
  redis:
    image: redis:alpine
    container_name: qts_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass "${REDIS_PASSWORD:-qts_local_dev}"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-qts_local_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qts_trader
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-qts_local_dev}@redis:6379/0
    mem_limit: 4g
    cpus: 2
    volumes:
      - ./logs:/app/logs
      - ./conf:/app/conf:ro
      # Optional: persist Hydra outputs for debugging without tracking in git
      - ./outputs:/app/outputs
      - ./multirun:/app/multirun
    # Use env-driven config (conf/store/redis.yaml reads REDIS_URL)
    command: python -m qts_core.main_live
    restart: on-failure
    # Give the trader time to liquidate positions before SIGKILL
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import os; import redis; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379/0')); assert r.exists('SYSTEM:HEARTBEAT')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qts_dashboard
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-qts_local_dev}
    ports:
      - "8501:8501"
    volumes:
      - ./conf:/app/conf:ro
    # Avoid coupling to repo paths inside the container: resolve the Streamlit app via import.
    command: >
      sh -c "streamlit run $(python -c 'import qts_core.dashboard.app as app; print(app.__file__)') --server.port 8501 --server.address 127.0.0.1"
    restart: always
