defaults:
  - gateway: mock
  - store: redis
  - _self_

env: "dev"
symbol: "BTC/USDT"
symbols:
  - "BTC/USDT"
  - "ETH/USDT"
  - "SOL/USDT"
  - "XRP/USDT"

oms:
  initial_cash: 100000.0
  risk_fraction: 0.045
  account_mode: "margin"
  short_leverage: 1.0
  short_borrow_rate_bps_per_day: 2.0
  min_short_liquidation_buffer: 0.05

supervisor:
  min_confidence: 0.50  # Balanced: was hardcoded 0.60; lowered to allow TA signals through

agents:
  strategies:
    - _target_: qts_core.agents.base.TechnicalAgent
      name: TrendFollower_A
      bullish_threshold: 0.015  # Deep-dive 50d: filter noise; trigger only on >=1.5% 1h impulse
    - _target_: qts_core.agents.base.TechnicalAgent
      name: MeanReversion_B
      bullish_threshold: 0.015  # Keep both technical agents aligned on stronger momentum filter
    - _target_: qts_core.agents.ict.ICTSmartMoneyAgent
      name: ICT_Sniper_NY
      symbol: BTC/USDT
      session_start: 13  # Balanced: restored NY+London overlap (13-17 UTC); was 0
      session_end: 17
  risk:
    _target_: qts_core.agents.base.StrictRiskAgent
    name: GlobalRiskOfficer
    min_signal_confidence: 0.60  # Balanced: was implicit 0.70; aligned with supervisor
    max_position_size: 0.10
    max_short_exposure: 0.10  # Tuned via sweep (was 0.08)

loop:
  tick_interval: 10.0
  heartbeat_key: "SYSTEM:HEARTBEAT"
  execution_timeout: 20.0
  max_session_drawdown: 0.10
  entry_cooldown_seconds: 60.0  # Balanced: was 90; redundant with per-candle limit
  max_entries_per_candle_per_symbol: 1

execution_guardrails:
  enabled: true
  min_volume: 0.10
  max_intrabar_volatility: 0.05
  high_volatility_size_scale: 0.60  # Balanced: was 0.40; less punishing in volatile moves
  max_estimated_slippage_bps: 50.0  # Balanced: was 30; 30 blocked 1h candles with >1.2% range
  slippage_volatility_factor: 0.25
  high_volatility_hours_utc: [14, 15, 16, 17, 18]  # Deep-dive 50d hotspot window
  high_volatility_hours_size_scale: 1.0
  high_volatility_hours_entry_block: false  # Disabled after rolling 7d validation (underperformed vs no guard)

trading:
  timeframe: "1h"

alerts:
  enabled: true
  last_key: "ALERTS:LAST"
  event_prefix: "ALERTS:EVENT"

telemetry:
  publish_views: true
  metrics_keys:
    total_value: "METRICS:TOTAL_VALUE"
    cash: "METRICS:CASH"
    pnl_daily: "METRICS:PNL_DAILY"
  latency_keys:
    tick_to_decision_ms: "METRICS:LATENCY:TICK_TO_DECISION_MS"
    decision_to_fill_ms: "METRICS:LATENCY:DECISION_TO_FILL_MS"
    tick_to_fill_ms: "METRICS:LATENCY:TICK_TO_FILL_MS"
  orders_key: "VIEW:ORDERS"
  positions_key: "VIEW:POSITIONS"
  last_price_key: "MARKET:LAST_PRICE"
  last_tick_key: "MARKET:LAST_TICK"
  ohlcv_key: "MARKET:OHLCV"
